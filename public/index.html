<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<title>AMASHIA MD BOT</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: url("https://drive.google.com/uc?export=download&id=1-ONk_ZlyFGy3ne7rmZJkwk-8pcwB9WMJ
}

.overlay {
  background: rgba(0,0,0,0.7);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:20px;
  width:320px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,255,200,0.2);
}

img {
  width:120px;
  border-radius:50%;
  border:3px solid #00ffcc;
  margin-bottom:10px;
}

input {
  width:90%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button {
  width:100%;
  padding:10px;
  background:#00ff99;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.bio {
  font-size:13px;
  margin-top:10px;
  color:#ddd;
}

#result {
  margin-top:10px;
  color:#00ffcc;
}
</style>
</head>

<body>

<div class="overlay">

<div class="card">

<!-- FOTO BOT -->
<img src="https://i.imgur.com/0y0y0y0.png" alt="bot">

<h2>🤖 AMASHIA MD BOT</h2>

<p class="bio">
AMASHIA MD se yon bot WhatsApp ki ka reponn mesaj, voye commands, epi jere group otomatikman.
</p>

<input id="number" placeholder="Antre nimewo (509xxxxxx)">

<button onclick="pair()">🔗 Jwenn Kòd</button>

<p id="result"></p>

</div>

</div>

<script>
async function pair(){
  let number = document.getElementById("number").value

  if(!number){
    alert("Mete nimewo")
    return
  }

  let res = await fetch("/pair", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({ number })
  })

  let data = await res.json()

  document.getElementById("result").innerText =
    "✅ Code: " + data.code
}
</script>

</body>
</html>
